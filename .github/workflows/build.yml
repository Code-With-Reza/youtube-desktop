name: Build Youtube Desktop

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22.x"
  # Silences the Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    if: github.event.pull_request.draft == false
    name: Build Youtube Desktop
    # Pins Windows runner to avoid redirection warnings
    runs-on: ${{ (matrix.os == 'windows-latest') && 'windows-2022' || matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        shell: bash
        run: |
          # Deleting the Mac-generated lockfile forces pnpm to resolve
          # and download the correct binaries for Linux and Windows
          rm -f pnpm-lock.yaml
          pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Vite Build (PR only)
        if: github.event_name == 'pull_request'
        run: pnpm build

      # These release scripts run electron-builder, which compiles the 
      # binaries and uploads them to a "Draft" GitHub Release
      - name: Build and release on Mac
        if: startsWith(matrix.os, 'macos') && github.event_name != 'pull_request' && github.repository == 'pear-devs/pear-desktop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:mac

      - name: Build and release on Linux
        if: startsWith(matrix.os, 'ubuntu') && github.event_name != 'pull_request' && github.repository == 'pear-devs/pear-desktop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder
          pnpm release:linux

      - name: Build and release on Windows
        if: startsWith(matrix.os, 'windows') && github.event_name != 'pull_request' && github.repository == 'pear-devs/pear-desktop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:win

      - name: Build
        if: github.event_name != 'pull_request'
        run: pnpm build

      - name: Test
        uses: coactions/setup-xvfb@v1
        env:
          CI: true
          # Fixes the 60s timeout error for the heavy Electron Mac tests
          PLAYWRIGHT_TEST_TIMEOUT: "120000"
        with:
          run: pnpm test:debug

      # NEW: Captures all build files so you can download them directly 
      # from the Actions tab, even without a GitHub release.
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: Youtube-Desktop-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.snap
            release/*.deb
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
          retention-days: 7


  release:
    runs-on: ubuntu-latest
    name: Release Youtube Desktop
    # Waits for Windows, Mac, and Linux to finish compiling successfully
    needs: build
    # Only runs if it's the main branch and main repository
    if: github.repository == 'pear-devs/pear-desktop' && github.ref == 'refs/heads/master'
    permissions:
      contents: write # Explicitly grants permission to publish releases & commit changes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          
      - name: Install dependencies
        shell: bash
        run: |
          rm -f pnpm-lock.yaml
          pnpm install
          
      - name: Get version
        run: |
          echo "VERSION_TAG=v$(node -pe "require('./package.json').version")" >> $GITHUB_ENV
          
      - name: Check if tag exists
        run: |
          echo "VERSION_HASH=$(git rev-parse -q --verify 'refs/tags/${{ env.VERSION_TAG }}' || echo '')" >> $GITHUB_ENV
          echo "CHANGELOG_ANCHOR=$(echo ${{ env.VERSION_TAG }} | sed -e 's/\.//g')" >> $GITHUB_ENV

      # Finalizes the Draft Release created by the runners in the 'build' job.
      - name: Publish Release
        if: env.VERSION_HASH == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: ${{ env.VERSION_TAG }}
          draft: false
          prerelease: false
          body: |
            See [changelog](https://github.com/pear-devs/pear-desktop/blob/master/changelog.md#${{ env.CHANGELOG_ANCHOR }}) for the list of updates and the full diff.
            Thanks to all contributors! 🏅
            (Note for Windows: `Pear-Desktop-Web-Setup-${{ env.VERSION_TAG }}.exe` is an installer, and `Pear-Desktop-${{ env.VERSION_TAG }}.exe` is a portable version)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update changelog
        if: env.VERSION_HASH == ''
        run: pnpm changelog
        
      - name: Commit changelog
        if: env.VERSION_HASH == ''
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update changelog for ${{ env.VERSION_TAG }}
          file_pattern: "changelog.md"
          commit_user_name: CI
          commit_user_email: KikoTs@users.noreply.github.com
