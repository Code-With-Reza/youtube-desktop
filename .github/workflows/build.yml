name: Build Youtube Desktop

on:
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "22.x"
  # 1. Fixes Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    if: github.event.pull_request.draft == false
    name: Build Youtube Desktop
    runs-on: ${{ (matrix.os == 'windows-latest') && 'windows-2022' || matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Configure pnpm for cross-platform
        run: |
          echo "supported-architectures.os=linux,darwin,win32" >> .npmrc
          echo "supported-architectures.cpu=x64,arm64" >> .npmrc

      - name: Install dependencies
        # We use 'pnpm install' without --frozen-lockfile to fix the Platform error
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Vite Build (PR only)
        if: github.event_name == 'pull_request'
        run: pnpm build

      - name: Build and release on Mac
        if: startsWith(matrix.os, 'macos') && github.event_name != 'pull_request' && github.repository == 'pear-devs/pear-desktop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:mac

      - name: Build and release on Linux
        if: startsWith(matrix.os, 'ubuntu') && github.event_name != 'pull_request' && github.repository == 'pear-devs/pear-desktop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder
          pnpm release:linux

      - name: Build and release on Windows
        if: startsWith(matrix.os, 'windows') && github.event_name != 'pull_request' && github.repository == 'pear-devs/pear-desktop'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:win

      - name: Build
        if: github.event_name != 'pull_request'
        run: pnpm build

      - name: Test
        uses: coactions/setup-xvfb@v1
        env:
          CI: true
          PLAYWRIGHT_TEST_TIMEOUT: "120000"
        with:
          run: pnpm test:debug

  release:
    runs-on: ubuntu-latest
    name: Release Youtube Desktop
    if: github.repository == 'pear-devs/pear-desktop' && github.ref == 'refs/heads/master'
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Get version
        run: echo "VERSION_TAG=v$(node -pe "require('./package.json').version")" >> $GITHUB_ENV
      - name: Check if tag exists
        run: echo "VERSION_HASH=$(git rev-parse -q --verify 'refs/tags/${{ env.VERSION_TAG }}' || echo '')" >> $GITHUB_ENV
      - name: Publish Release
        if: env.VERSION_HASH == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: ${{ env.VERSION_TAG }}
          body: "Release ${{ env.VERSION_TAG }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
